name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Setting version to $version"
          # Update tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          # Update package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Breeze ${{ github.ref_name }}'
          releaseBody: |
            ## 🍃 Breeze ${{ github.ref_name }}

            ### 下载安装
            - **推荐**：下载 `.msi` 安装包，双击安装
            - **备选**：下载 `-setup.exe` (NSIS 安装包)

            ### ⚠️ Windows SmartScreen 提示
            安装时如果弹出"Windows 已保护你的电脑"提示，请点击 **"更多信息"** → **"仍要运行"**。
            这是因为安装包尚未进行代码签名，不影响软件安全性。

            ### 系统要求
            - Windows 10/11 (x64)
            - 需要已安装 [Winget](https://github.com/microsoft/winget-cli)
          releaseDraft: false
          prerelease: false
